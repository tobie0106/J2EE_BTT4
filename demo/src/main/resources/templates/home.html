<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-4">
        <h2>Welcome to Product Management System</h2>

        <div sec:authorize="isAuthenticated()" class="alert alert-success">
            <h4>Hello, <span sec:authentication="name"></span>!</h4>
            <p>Your roles: <span sec:authentication="authorities"></span></p>
        </div>

        <div sec:authorize="!isAuthenticated()" class="alert alert-info">
            <p>Please <a href="/login">login</a> to access the system.</p>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Products</h5>
                        <p class="card-text">Manage your products here.</p>
                        <a href="/products" class="btn btn-primary">View Products</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Admin Panel</h5>
                        <p class="card-text">Administrative functions.</p>
                        <a href="/products/create" class="btn btn-warning">Create Product</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></script>
</body>
</html>
